<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared.css">
  <title>Set Master Password</title>
  <style>
    .field { margin-bottom: 12px; }
    .info {
      color: #a0a0b8;
      font-size: 13px;
      margin-bottom: 16px;
      line-height: 1.4;
    }
    .mismatch { color: #e94560; font-size: 12px; margin-top: 4px; display: none; }
  </style>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">Set Master Password</span>
    <button class="titlebar-close" id="btn-close">&times;</button>
  </div>
  <div class="content">
    <div class="info">
      Create a master password to encrypt your stored credentials.
      You will need this password to access your accounts.
    </div>
    <div class="field">
      <label for="input-password">Master Password</label>
      <input type="password" id="input-password" autofocus>
    </div>
    <div class="field">
      <label for="input-confirm">Confirm Password</label>
      <input type="password" id="input-confirm">
      <div class="mismatch" id="mismatch-msg">Passwords do not match.</div>
    </div>
    <div class="button-row">
      <button class="secondary" id="btn-cancel">Cancel</button>
      <button class="primary" id="btn-save">Set Password</button>
    </div>
  </div>

  <script>
    const passwordInput = document.getElementById("input-password");
    const confirmInput = document.getElementById("input-confirm");
    const mismatchMsg = document.getElementById("mismatch-msg");

    function submit() {
      const pw = passwordInput.value;
      const confirm = confirmInput.value;
      mismatchMsg.style.display = "none";

      if (!pw) { passwordInput.focus(); return; }
      if (pw !== confirm) {
        mismatchMsg.style.display = "block";
        confirmInput.focus();
        return;
      }

      window.tradegate.sendResult({ password: pw });
    }

    document.getElementById("btn-save").addEventListener("click", submit);
    document.getElementById("btn-cancel").addEventListener("click", () => window.tradegate.cancel());
    document.getElementById("btn-close").addEventListener("click", () => window.tradegate.cancel());

    document.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        submit();
      } else if (e.key === "Escape") {
        e.preventDefault();
        window.tradegate.cancel();
      }
    });

    window.tradegate.onInitData(() => {
      passwordInput.focus();
    });
  </script>
</body>
</html>
