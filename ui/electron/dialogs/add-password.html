<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared.css">
  <title>Enter Password</title>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title" id="title">Enter Password</span>
    <button class="titlebar-close" id="btn-close">&times;</button>
  </div>
  <div class="content">
    <label id="prompt-label">Enter password:</label>
    <input type="password" id="password-input" autofocus>
    <div class="button-row">
      <button class="secondary" id="btn-cancel">Cancel</button>
      <button class="primary" id="btn-save">Save</button>
    </div>
  </div>

  <script>
    const input = document.getElementById("password-input");

    function submit() {
      const password = input.value;
      if (password) {
        window.tradegate.sendResult({ password: password });
      }
    }

    document.getElementById("btn-save").addEventListener("click", submit);
    document.getElementById("btn-cancel").addEventListener("click", () => window.tradegate.cancel());
    document.getElementById("btn-close").addEventListener("click", () => window.tradegate.cancel());

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        submit();
      } else if (e.key === "Escape") {
        e.preventDefault();
        window.tradegate.cancel();
      }
    });

    window.tradegate.onInitData((data) => {
      const platform = data.platform || "";
      const username = data.username || "";

      if (platform && username) {
        document.getElementById("title").textContent = `Password for ${username}`;
        document.getElementById("prompt-label").textContent =
          `Enter password for ${username} on ${platform}:`;
      }

      input.focus();
    });
  </script>
</body>
</html>
