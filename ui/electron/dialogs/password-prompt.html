<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="shared.css">
  <title>Master Password</title>
</head>
<body>
  <div class="titlebar">
    <span class="titlebar-title">Master Password</span>
    <button class="titlebar-close" id="btn-close">&times;</button>
  </div>
  <div class="content">
    <div id="warning-area"></div>
    <label for="password-input">Enter master password for encrypted credentials:</label>
    <input type="password" id="password-input" autofocus>
    <div class="button-row">
      <button class="secondary" id="btn-cancel">Cancel</button>
      <button class="primary" id="btn-unlock">Unlock</button>
    </div>
  </div>

  <script>
    const input = document.getElementById("password-input");

    function submit() {
      const password = input.value;
      if (password) {
        window.tradegate.sendResult({ password: password });
      }
    }

    document.getElementById("btn-unlock").addEventListener("click", submit);
    document.getElementById("btn-cancel").addEventListener("click", () => window.tradegate.cancel());
    document.getElementById("btn-close").addEventListener("click", () => window.tradegate.cancel());

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        e.preventDefault();
        submit();
      } else if (e.key === "Escape") {
        e.preventDefault();
        window.tradegate.cancel();
      }
    });

    window.tradegate.onInitData((data) => {
      const attempt = data.attempt || 0;
      const maxRetries = data.max_retries || 3;

      if (attempt > 0) {
        const remaining = maxRetries - attempt;
        const warningArea = document.getElementById("warning-area");
        const s = remaining !== 1 ? "s" : "";
        warningArea.textContent = "";
        const warningDiv = document.createElement("div");
        warningDiv.className = "warning";
        warningDiv.textContent = "Incorrect password. " + remaining + " attempt" + s + " remaining.";
        warningArea.appendChild(warningDiv);
      }

      input.focus();
    });
  </script>
</body>
</html>
