name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  build-wheel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build deps
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - uses: actions/upload-artifact@v4
        with:
          name: wheel
          path: dist/

  build-standalone:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: tradegate-macos
            sep: ":"
          - os: windows-latest
            artifact: tradegate-windows
            sep: ";"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python deps
        run: pip install . pyinstaller

      - name: Install Windows extras
        if: runner.os == 'Windows'
        run: pip install pywinauto

      - name: Install Electron
        working-directory: ui/electron
        run: npm install

      - name: Build with PyInstaller
        run: >
          pyinstaller
          --name tradegate
          --onedir
          --console
          --hidden-import keyring.backends
          --add-data "ui/electron/main.js${{ matrix.sep }}ui/electron"
          --add-data "ui/electron/preload.js${{ matrix.sep }}ui/electron"
          --add-data "ui/electron/package.json${{ matrix.sep }}ui/electron"
          --add-data "ui/electron/dialogs${{ matrix.sep }}ui/electron/dialogs"
          cli.py

      - name: Copy Electron node_modules into dist
        shell: bash
        run: |
          # PyInstaller places --add-data files under _internal/ in onedir mode
          target="dist/tradegate/_internal/ui/electron"
          if [ ! -d "$target" ]; then
            target="dist/tradegate/ui/electron"
          fi
          mkdir -p "$target"
          cp -R ui/electron/node_modules "$target/node_modules"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/tradegate/
